<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Monitor promocji paliwowych">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c5b38"/>
      <stop offset="0.55" stop-color="#1f8a70"/>
      <stop offset="1" stop-color="#35b592"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4b942"/>
      <stop offset="1" stop-color="#e69a1a"/>
